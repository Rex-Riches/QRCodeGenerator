<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure QR URL Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff, #f9fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #1f3a5f;
            margin-bottom: 15px;
        }

        p {
            text-align: center;
            color: #444;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 12px;
            margin-bottom: 6px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd8e3;
            border-radius: 10px;
            margin-bottom: 12px;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: #1f3a5f;
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #1f3a5f;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #17314d;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .card {
                padding: 25px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Secure QR URL Generator</h1>
        <p>Create a password-protected QR code for one URL.</p>

        <form th:action="@{/generate}" method="post">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. My Instagram" required>

            <label for="originalUrl">Profile URL</label>
            <input type="url" id="originalUrl" name="originalUrl" placeholder="https://instagram.com/yourname" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Set access password" required>

            <button type="submit">Generate QR Code</button>
        </form>

        <p class="error" th:if="${error}" th:text="${error}"></p>
    </div>
</div>
</body>
</html>
