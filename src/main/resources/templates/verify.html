<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff, #f9fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            color: #1f3a5f;
            margin-bottom: 15px;
        }

        p {
            color: #444;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd8e3;
            border-radius: 10px;
            margin-bottom: 12px;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: #1f3a5f;
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #1f3a5f;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #17314d;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Protected Link</h1>
        <p>Enter password to access: <strong th:text="${title}"></strong></p>

        <form th:action="@{'/access/' + ${token}}" method="post">
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Unlock</button>
        </form>

        <p class="error" th:if="${error}" th:text="${error}"></p>
    </div>
</div>
</body>
</html>
